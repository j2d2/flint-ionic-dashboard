<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Flint Dashboard</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="login-content">
  <div class="login-wrapper">
    <ion-card class="login-card">
      <ion-card-header>
        <ion-card-title>Sign In</ion-card-title>
      </ion-card-header>

      <ion-card-content>
        @if (error()) {
          <ion-text color="danger">
            <p class="login-error">{{ error() }}</p>
          </ion-text>
        }

        <ion-item>
          <ion-label position="stacked">Username</ion-label>
          <ion-input
            type="text"
            [value]="username()"
            (ionInput)="username.set($any($event.target).value)"
            autocomplete="username"
            placeholder="admin"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="stacked">Password</ion-label>
          <ion-input
            type="password"
            [value]="password()"
            (ionInput)="password.set($any($event.target).value)"
            autocomplete="current-password"
            placeholder="••••••••"
            (keyup.enter)="submit()"
          ></ion-input>
        </ion-item>

        <ion-button
          expand="block"
          class="login-btn"
          [disabled]="loading()"
          (click)="submit()"
        >
          @if (loading()) {
            <ion-spinner name="crescent"></ion-spinner>
          } @else {
            Sign In
          }
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
