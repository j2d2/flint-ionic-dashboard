<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Agent Tasks</ion-title>
    <ion-buttons slot="end">
      <ion-button id="quick-add-trigger" aria-label="New">
        <ion-icon slot="icon-only" name="add-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-segment [value]="filter()" (ionChange)="onFilterChange($any($event.detail.value))">
      <ion-segment-button value="active">
        <ion-label>Active</ion-label>
      </ion-segment-button>
      <ion-segment-button value="all">
        <ion-label>All ({{ total() }})</ion-label>
      </ion-segment-button>
    </ion-segment>
    <ion-buttons slot="end">
      <ion-button
        fill="clear"
        size="small"
        [title]="sortBy() === 'updated' ? 'Sorted: recently updated' : 'Sorted: priority'"
        (click)="sortBy.set(sortBy() === 'priority' ? 'updated' : 'priority')"
        aria-label="Toggle sort">
        <ion-icon slot="icon-only" [name]="sortBy() === 'updated' ? 'time-outline' : 'trending-up-outline'"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-popover trigger="quick-add-trigger" triggerAction="click" [dismissOnSelect]="true" size="auto">
  <ng-template>
    <ion-list lines="full" class="ion-no-padding quick-actions-list">
      <ion-item button detail="false" (click)="goToChat()">
        <ion-icon name="chatbubble-ellipses-outline" slot="start"></ion-icon>
        <ion-label>New Chat</ion-label>
      </ion-item>
      <ion-item button detail="false" (click)="openNewAgentTask()">
        <ion-icon name="flash-outline" slot="start"></ion-icon>
        <ion-label>New Agent Task</ion-label>
      </ion-item>
      <ion-item detail="false" [disabled]="true">
        <ion-icon name="git-branch-outline" slot="start"></ion-icon>
        <ion-label>
          New Thread
          <p>Persisted named conversations &mdash; coming soon</p>
        </ion-label>
      </ion-item>
    </ion-list>
  </ng-template>
</ion-popover>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="loadTasks($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list>
    <ion-item
      button
      detail="true"
      *ngFor="let task of filteredTasks()"
      (click)="openTask(task.id)">
      <ion-label>
        <h2>{{ task.title }}</h2>
        <p>{{ task.task_type }} &middot; {{ task.model ?? '&mdash;' }}</p>
        <p *ngIf="task.vault_note" class="vault-ref">
          <ion-icon name="document-text-outline"></ion-icon>
          {{ task.vault_note }}
        </p>
      </ion-label>
      <ion-badge slot="end" [color]="priorityColor(task.priority)" class="priority-badge">{{ priorityLabel(task.priority) }}</ion-badge>
      <ion-badge slot="end" [color]="statusColor(task.status)">{{ task.status }}</ion-badge>
      <ion-note slot="end" class="ion-padding-start">{{ formatDate(task.updated_at) }}</ion-note>
    </ion-item>
  </ion-list>

  <ion-infinite-scroll (ionInfinite)="loadMore($event)">
    <ion-infinite-scroll-content loadingText="Loading more tasks..."></ion-infinite-scroll-content>
  </ion-infinite-scroll>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button color="primary" (click)="openNewAgentTask()">
      <ion-icon name="flash-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
