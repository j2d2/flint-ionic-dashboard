<ion-header>
  <ion-toolbar>
    <ion-title>{{ modalTitle }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">Close</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="stacked">Title</ion-label>
    <ion-textarea
      [(ngModel)]="title"
      placeholder="What should this agent do?"
      auto-grow="true"
      rows="3"
    ></ion-textarea>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Description (optional)</ion-label>
    <ion-textarea
      [(ngModel)]="description"
      placeholder="Additional context..."
      auto-grow="true"
      rows="3"
    ></ion-textarea>
  </ion-item>

  <!-- Channel picker — only for Thread mode -->
  <ion-item *ngIf="mode === 'thread'">
    <ion-label>Channel</ion-label>
    <ion-select [(ngModel)]="channel" interface="popover" (ngModelChange)="onChannelChange()">
      <ion-select-option *ngFor="let ch of channels" [value]="ch.id">
        {{ ch.name }}
      </ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item>
    <ion-label>Agent Type</ion-label>
    <ion-select [(ngModel)]="taskType" interface="popover">
      <ion-select-option *ngFor="let type of taskTypes" [value]="type.value">
        {{ type.label }}
      </ion-select-option>
    </ion-select>
  </ion-item>

  <ion-button expand="block" class="ion-margin-top" [disabled]="isSubmitting() || !title.trim()" (click)="submit()">
    {{ submitLabel }}
  </ion-button>
</ion-content>
